services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tenaforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/uploads
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  web-saas:
    image: node:20-alpine
    profiles: ["saas"]
    working_dir: /app
    env_file: .env
    command: sh -c "npm install && npm --workspace apps/web run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3002:3000"
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - redis

  worker-saas:
    image: python:3.11-slim
    profiles: ["saas"]
    working_dir: /app/apps/worker
    env_file: .env
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8100"
    ports:
      - "8100:8100"
    volumes:
      - ./:/app
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  web_node_modules:

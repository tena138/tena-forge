services:
  - type: web
    name: tena-forge-web
    runtime: node
    rootDir: frontend
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    autoDeployTrigger: commit
    plan: starter
    domains:
      - www.tena-forge.com
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_CUSTOMER_SUPPORT_EMAIL
        value: support@tena-forge.com

  - type: web
    name: tena-forge-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    preDeployCommand: python scripts/repair_alembic_version.py && alembic upgrade head && python scripts/ensure_admin_account.py && python scripts/repair_admin_student_management_owner.py && python scripts/ensure_admin_templates.py && python scripts/ensure_pg_review_account.py
    plan: standard
    healthCheckPath: /health
    disk:
      name: tena-forge-uploads
      mountPath: /uploads
      sizeGB: 20
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tena-forge-db
          property: connectionString
      - key: UPLOADS_DIR
        value: /uploads
      - key: STORAGE_TYPE
        value: local
      - key: BATCH_PROCESSING_MODE
        value: cloud
      - key: PORT
        value: 8000
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true
      - key: REFRESH_COOKIE_SECURE
        value: "true"
      - key: REFRESH_COOKIE_SAMESITE
        value: none
      - key: ENCRYPTION_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: Tena Forge
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: admin@tena-forge.com
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        value: Tena Admin
      - key: PG_REVIEW_EMAIL
        value: pg-review@tena-forge.com
      - key: PG_REVIEW_PASSWORD
        value: TenaReview!2026
      - key: PG_REVIEW_NAME
        value: Toss Payments Review
      - key: AI_MODEL_POOL
        value: gpt-5.4-mini,gpt-5-mini
      - key: AI_SOLUTION_MODEL_POOL
        value: gpt-5.4-mini,gpt-5-mini
      - key: AI_SOLUTION_MODE
        value: full
      - key: AI_SOLUTION_MAX_OUTPUT_TOKENS
        value: "8192"
      - key: AI_SOLUTION_IMAGE_DETAIL
        value: high
      - key: SEMANTIC_MATCHING_ENABLED
        value: "false"
      - key: PDF_SOLUTION_RENDER_DPI
        value: "180"

databases:
  - name: tena-forge-db
    databaseName: tenaforge
    user: tenaforge
    plan: basic-256mb
    diskSizeGB: 15
